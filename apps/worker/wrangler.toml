# ReadAloud Worker — wrangler config (template).
#
# Environments:
#   • default    → local development (`wrangler dev`). Calls REAL Workers AI
#                  through the Cloudflare AI Gateway, so it needs `wrangler login`
#                  (the AI binding runs remotely even in local dev). The mock
#                  summarizer is only a fallback used by the hermetic E2E suite
#                  (which boots `wrangler dev --var SUMMARY_BACKEND:mock`).
#   • staging    → `wrangler deploy --env staging`
#   • production → `wrangler deploy --env production`
#
# One-time setup before AI works:
#   wrangler login
#   wrangler ai gateway create readaloud           # then paste its id below
#   wrangler kv namespace create RATE_LIMIT --env staging
#   wrangler kv namespace create RATE_LIMIT --env production
#   wrangler secret put ELEVENLABS_API_KEY --env staging   # milestone 6
# NEVER commit real secrets — they live in Cloudflare, not here.

name = "readaloud-worker"
main = "src/index.ts"
compatibility_date = "2026-06-01"
workers_dev = true

# ───────────────────────── default: local development ─────────────────────────
[vars]
ENVIRONMENT = "development"
SUMMARY_BACKEND = "workers-ai"
SUMMARY_MODEL = "@cf/meta/llama-3.1-8b-instruct"
AI_GATEWAY_ID = "open-ai"          # routes Workers AI through AI Gateway
ALLOWED_ORIGINS = ""
RATE_LIMIT_PER_MIN = "0"             # disabled locally for easy iteration

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "local-dev"                     # placeholder; Miniflare uses local KV in dev

# ───────────────────────────────── staging ─────────────────────────────────
[env.staging]
workers_dev = true

[env.staging.vars]
ENVIRONMENT = "staging"
SUMMARY_BACKEND = "workers-ai"
SUMMARY_MODEL = "@cf/meta/llama-3.1-8b-instruct"
AI_GATEWAY_ID = "open-ai"
ALLOWED_ORIGINS = "chrome-extension://REPLACE_WITH_EXTENSION_ID"
RATE_LIMIT_PER_MIN = "30"

[env.staging.ai]
binding = "AI"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_STAGING_KV_ID"

# ──────────────────────────────── production ────────────────────────────────
[env.production]
workers_dev = false
# route = "tts.yourdomain.com/*"     # optional custom domain

[env.production.vars]
ENVIRONMENT = "production"
SUMMARY_BACKEND = "workers-ai"
SUMMARY_MODEL = "@cf/meta/llama-3.3-70b-instruct"
AI_GATEWAY_ID = "open-ai"
ALLOWED_ORIGINS = "chrome-extension://REPLACE_WITH_EXTENSION_ID"
RATE_LIMIT_PER_MIN = "20"

[env.production.ai]
binding = "AI"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_PRODUCTION_KV_ID"
