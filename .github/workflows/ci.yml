name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Format · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build (all workspaces)
        run: npm run build

  # End-to-end tests drive the real built extension in Playwright's bundled
  # Chromium against an offline mock Worker. They need no credentials, so they
  # run in CI too — kept separate so a flaky browser run never blocks the gate.
  e2e:
    name: Extension E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E suites
        run: npm run e2e --workspace @readaloud/extension

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: apps/extension/e2e/screenshots/
          if-no-files-found: ignore
